let af='all';
function rb(r){return r==='granite'?'<span class="badge bg_">花崗岩</span>':r==='sedimentary'?'<span class="badge bs">堆積岩</span>':'<span class="badge bm">混合岩</span>';}
function sb(l){let b='';for(let i=0;i<3;i++)b+='<div class="sigb'+(i<l?' on':'')+'" style="height:'+(6+i*4)+'px"></div>';return'<div class="sigbars">'+b+'</div>';}
function setFilter(f,el){af=f;document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));el.classList.add('active');renderList();}
function renderList(){
  const q=(document.getElementById('searchInput').value||'').toLowerCase();
  const fl=C.filter(c=>{
    const ms=!q||c.name.includes(q)||String(c.en).toLowerCase().includes(q)||String(c.area).includes(q)||String(c.pref).includes(q);
    const mf=af==='all'||String(c.pref).includes(af)||c.rock===af;
    return ms&&mf;
  });
  const lv=document.getElementById('listView');
  if(!fl.length){lv.innerHTML='<div class="no-results">該当する渓谷がありません</div>';return;}
  lv.innerHTML=fl.map(c=>'<div class="canyon-card" onclick="showDetail('+c.no+')"><div class="card-main"><div class="canyon-num">'+c.no+'</div><div class="card-info"><div class="card-name">'+c.name+'</div><div class="card-en">'+c.en+'</div><div class="card-meta"><span class="badge bp">'+c.pref+'</span>'+rb(c.rock)+(c.stars?'<span class="bstars">'+c.stars+'</span>':'')+'</div></div><div class="card-arrow">›</div></div></div>').join('');
}
function showDetail(no){
  const c=C.find(x=>Number(x.no)===Number(no));
  if(!c)return;
  const st=c.sl===0?'完全圏外':c.sl===1?'微弱（道路付近）':'良好（一部圏外）';
  const rn=String(c.rock)==='granite'?'花崗岩':String(c.rock)==='sedimentary'?'堆積岩':'混合岩';
  document.getElementById('appList').style.display='none';
  const dv=document.getElementById('appDetail');
  dv.style.display='block';
  dv.innerHTML='<div class="detail-header"><button class="back-btn" onclick="backToList()">‹ 一覧に戻る</button><div class="dname">'+c.name+'</div><div class="den">'+c.en+'</div><div class="dstars">'+c.stars+'</div><div class="dbadges"><span class="dbadge">'+c.pref+' '+c.area+'</span><span class="dbadge">'+rn+'</span></div></div>'
  +'<div class="section"><div class="stitle">基本情報</div><div class="info-grid"><div class="iitem"><div class="ilabel">標高差</div><div class="ival">'+c.v+'</div></div><div class="iitem"><div class="ilabel">水平距離</div><div class="ival">'+c.d+'</div></div><div class="iitem"><div class="ilabel">集水面積</div><div class="ival">'+c.ca+'</div></div><div class="rain-highlight"><div class="rain-label">3日間降水量</div><div class="rain-val">'+c.rain+'</div></div></div><div class="irow"><span class="irl">所要時間</span><span class="irv">'+c.time+'</span></div><div class="irow"><span class="irl">駐車場</span><span class="irv">'+c.park+'</span></div></div>'
  +'<div class="section"><div class="stitle">テクニカル</div><div class="irow"><span class="irl">最大懸垂</span><span class="irv">'+c.abs+'</span></div><div class="irow"><span class="irl">推奨ロープ</span><span class="irv">'+c.rope+'</span></div><div class="irow"><span class="irl">リギング</span><span class="irv">'+c.rig+'</span></div><div class="irow"><span class="irl">支点形式</span><span class="irv">'+c.anc+'</span></div><div class="irow"><span class="irl">アクション</span><span class="irv">'+c.act+'</span></div><div class="irow"><span class="irl">エスケープ</span><span class="irv">'+c.esc+'</span></div></div>'
  +'<div class="section"><div class="stitle">水文・環境</div><div class="irow"><span class="irl">地質</span><span class="irv">'+c.geo+'</span></div><div class="irow"><span class="irl">水質・水温</span><span class="irv">'+c.wq+'</span></div><div class="alert-box"><div style="font-size:14px;flex-shrink:0">⚠️</div><div class="alert-text">'+c.risk+'</div></div></div>'
  +(c.map?'<div class="section"><div class="stitle">地図を開く</div><a class="map-btn" href="'+c.map+'" target="_blank">📍 GoogleMap で開く</a><a class="map-btn map-btn2" href="'+c.gsi+'" target="_blank">🗾 地理院地図で開く</a></div>':'')
  +'<div class="section"><div class="stitle">安全・インフラ</div>'
  +'<div class="emr-item"><span class="emrl">救急病院</span><div class="emrr"><div class="emrname">'+c.hosp+'</div>'+(c.htel?'<a href="tel:'+c.htel+'" class="emrtel">📞 '+c.htel+'</a>':'')+'</div></div>'
  +'<div class="emr-item"><span class="emrl">警察</span><div class="emrr"><div class="emrname">'+c.pol+'</div>'+(c.ptel?'<a href="tel:'+c.ptel+'" class="emrtel">📞 '+c.ptel+'</a>':'')+'</div></div>'
  +(c.heli&&c.heli!=='—'?'<div class="emr-item"><span class="emrl">ヘリ着陸点</span><div class="emrr"><div class="emrname">'+c.heli+'</div></div></div>':'')
  +'<div class="emr-item"><span class="emrl">最終コンビニ</span><div class="emrr"><div class="emrname">'+c.conv+'</div></div></div>'
  +'<div class="emr-item"><span class="emrl">トイレ</span><div class="emrr"><div class="emrname">'+c.toilet+'</div></div></div>'
  +'<div class="emr-item"><span class="emrl">ガソリン</span><div class="emrr"><div class="emrname">'+c.gas+'</div></div></div>'
  +'<div class="emr-item"><span class="emrl">下山後の温泉</span><div class="emrr"><div class="emrname">'+c.onsen+'</div></div></div>'
  +'<div class="emr-item"><span class="emrl">電波状況</span><div class="emrr"><div class="sigwrap">'+sb(c.sl)+'<span style="font-size:12px">'+st+'</span></div></div></div>'
  +'</div><div class="detail-bottom"></div>';
  dv.scrollTop=0;window.scrollTo(0,0);
}
function backToList(){document.getElementById('appDetail').style.display='none';document.getElementById('appList').style.display='block';}
renderList();
